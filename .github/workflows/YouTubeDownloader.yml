name: 🎯 YouTube Downloader Pro

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Download Mode'
        required: true
        type: choice
        options:
          - single
          - playlist
          - channel
          - search
        default: 'single'
      url:
        description: '🎬 URL or Search Query or channel name (@ChannelName or ChannelName)'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: 'Quality (video: 144/360/480/720/1080 | audio: 128/192/320)'
        required: false
        type: string
        default: '720'
      max_videos:
        description: '🔢 Max results'
        required: false
        type: number
        default: 10
      split_threshold_mb:
        description: '📦 Split > MB (0=no)'
        required: false
        type: number
        default: 50
      subtitles:
        description: '📝 Download subtitles'
        required: false
        type: boolean
        default: false
      qualities:
        description: 'Multiple qualities (comma: 360,720,1080) - leave empty for single'
        required: false
        type: string
        default: ''
      priority:
        description: '⭐ Priority order'
        required: false
        type: choice
        options:
          - default
          - most_views
          - newest_first
          - shortest_first
        default: 'default'
      create_podcast:
        description: '🎙️ Create podcast from playlist'
        required: false
        type: boolean
        default: false
      generate_rss:
        description: '📡 Generate RSS feed'
        required: false
        type: boolean
        default: false
      schedule_mode:
        description: '⏱️ Smart scheduling (only download in low traffic hours)'
        required: false
        type: boolean
        default: false

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'

jobs:
  download-and-process:
    name: 🚀 YouTube Downloader Pro
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: ⚡ Setup
        run: |
          python3 -c "import requests" 2>/dev/null || pip3 install -q requests
          command -v yt-dlp &>/dev/null || pip3 install -q yt-dlp
          command -v zip &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq zip)
          command -v ffmpeg &>/dev/null || (sudo apt-get install -y -qq ffmpeg)

      - name: 🔗 Prepare
        id: prep
        run: |
          M="${{ github.event.inputs.mode }}"
          U="${{ github.event.inputs.url }}"
          [[ "$M" == "channel" && "$U" != http* ]] && U="https://www.youtube.com/$([[ "$U" == @* ]] && echo "$U" || echo "@$U")"
          echo "URL=$U" >> $GITHUB_OUTPUT
          echo "MODE=$M" >> $GITHUB_OUTPUT

      - name: 🎯 Download & Process
        id: main
        env:
          MODE: ${{ steps.prep.outputs.MODE }}
          URL: ${{ steps.prep.outputs.URL }}
          TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
          MAX: ${{ github.event.inputs.max_videos }}
          SPLIT: ${{ github.event.inputs.split_threshold_mb }}
          SUBTITLES: ${{ github.event.inputs.subtitles }}
          QUALITIES: ${{ github.event.inputs.qualities }}
          PRIORITY: ${{ github.event.inputs.priority }}
          CREATE_PODCAST: ${{ github.event.inputs.create_podcast }}
          GENERATE_RSS: ${{ github.event.inputs.generate_rss }}
          SCHEDULE_MODE: ${{ github.event.inputs.schedule_mode }}
        run: |
          python3 << 'PYEOF'
          import os, json, time, re, subprocess, sys, hashlib
          import requests as rq
          from pathlib import Path
          from datetime import datetime
          from collections import defaultdict

          M = os.environ['MODE']
          U = os.environ['URL']
          T = os.environ['TYPE']
          Q = os.environ.get('QUALITY', '720')
          MX = int(os.environ.get('MAX', '10'))
          SP = int(os.environ.get('SPLIT', '50'))
          SUBTITLES = os.environ.get('SUBTITLES', 'false').lower() == 'true'
          MULTI_QUALITIES = [q.strip() for q in os.environ.get('QUALITIES', '').split(',') if q.strip()]
          PRIORITY = os.environ.get('PRIORITY', 'default')
          CREATE_PODCAST = os.environ.get('CREATE_PODCAST', 'false').lower() == 'true'
          GENERATE_RSS = os.environ.get('GENERATE_RSS', 'false').lower() == 'true'
          SCHEDULE_MODE = os.environ.get('SCHEDULE_MODE', 'false').lower() == 'true'

          # Smart scheduling - فقط در ساعات خلوت دانلود کن
          if SCHEDULE_MODE:
              current_hour = datetime.now().hour
              if not (2 <= current_hour <= 6):
                  print(f"⏰ Smart scheduling: Current hour {current_hour} is not in low-traffic window (2-6 AM)")
                  print("   Exiting to save resources. Run again during low-traffic hours.")
                  sys.exit(0)

          API = 'https://hub.ytconvert.org/api/download'
          H = {
              'User-Agent': 'Mozilla/5.0',
              'Accept': 'application/json',
              'Referer': 'https://media.ytmp3.gg/',
              'Content-Type': 'application/json',
              'Origin': 'https://media.ytmp3.gg'
          }

          # Archive system - جلوگیری از دانلود مجدد
          ARCHIVE_FILE = 'downloaded_archive.txt'
          
          def load_archive():
              if Path(ARCHIVE_FILE).exists():
                  with open(ARCHIVE_FILE, 'r') as f:
                      return set(line.strip() for line in f)
              return set()
          
          def mark_downloaded(video_id):
              with open(ARCHIVE_FILE, 'a') as f:
                  f.write(f"{video_id}\n")
          
          downloaded_ids = load_archive()

          def safe_name(text, maxlen=40):
              safe = re.sub(r'[^\w]', '_', text)[:maxlen]
              safe = re.sub(r'_+', '_', safe).strip('_')
              if not safe:
                  safe = hashlib.md5(text.encode()).hexdigest()[:8]
              return safe

          def fm(n):
              if not n: return 'N/A'
              try:
                  n = int(n)
                  return f'{n/1e6:.1f}M' if n >= 1e6 else f'{n/1e3:.1f}K' if n >= 1e3 else str(n)
              except: return str(n)

          def gv(vid):
              """Get video info AND channel name from actual video data"""
              try:
                  r = subprocess.run(
                      ['yt-dlp', '--dump-json', '--no-warnings', '--no-check-certificate',
                       f'https://youtube.com/watch?v={vid}'],
                      capture_output=True, text=True, timeout=15
                  )
                  if r.returncode == 0 and r.stdout.strip():
                      d = json.loads(r.stdout)
                      channel = (d.get('channel') or d.get('uploader') or 
                                d.get('uploader_id') or d.get('creator') or 'Unknown')
                      views = d.get('view_count')
                      duration = d.get('duration', 0)
                      channel_url = d.get('channel_url', '') or d.get('uploader_url', '')
                      upload_date = d.get('upload_date', '')
                      handle = None
                      if channel_url:
                          m = re.search(r'@([\w-]+)', channel_url)
                          if m: handle = m.group(1)
                      if not handle:
                          handle = safe_name(channel, 30) if channel and channel != 'Unknown' else None
                      return (channel.strip() if channel else 'Unknown', views, int(duration) if duration else 0, handle, upload_date)
              except: pass
              return ('Unknown', None, 0, None, '')

          def get_channel_from_url(url):
              m = re.search(r'@([\w-]+)', url)
              if m: return m.group(1)
              m = re.search(r'channel/([\w-]+)', url)
              if m: return m.group(1)
              m = re.search(r'c/([\w-]+)', url)
              if m: return m.group(1)
              m = re.search(r'user/([\w-]+)', url)
              if m: return m.group(1)
              return None

          def get_channel_from_playlist(playlist_url):
              try:
                  cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--playlist-end', '1',
                         '--no-warnings', '--no-check-certificate', playlist_url]
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  if r.returncode == 0 and r.stdout.strip():
                      d = json.loads(r.stdout.strip().split('\n')[0])
                      vid = d.get('id', '')
                      if vid:
                          _, _, _, handle, _ = gv(vid)
                          if handle: return handle
                      ch = d.get('channel') or d.get('uploader') or d.get('uploader_id')
                      if ch: return safe_name(ch, 30)
              except: pass
              return None

          def gvl(u, n):
              """Get video list with priority sorting"""
              channel_folder = get_channel_from_url(u)
              
              if not channel_folder and 'playlist' in u:
                  print(f'   🔍 Detecting channel from playlist...')
                  channel_folder = get_channel_from_playlist(u)
              
              if not channel_folder:
                  channel_folder = 'playlist_videos'
              
              print(f'   📁 Folder: {channel_folder}_videos')
              
              c = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate']
              if n > 0: c.extend(['--playlist-end', str(n)])
              c.append(u)
              r = subprocess.run(c, capture_output=True, text=True, timeout=30)
              v = []
              for line in r.stdout.strip().split('\n'):
                  if line and len(v) < n:
                      try:
                          d = json.loads(line)
                          vid = d.get('id', '')
                          if not vid: continue
                          
                          title = d.get('title', 'Untitled')[:60]
                          print(f'   📊 [{len(v)+1}/{n}] {title}...')
                          
                          ch, vw, dr, _, upload_date = gv(vid)
                          
                          if not ch or ch == 'Unknown':
                              ch = (d.get('channel') or d.get('uploader') or 
                                    d.get('uploader_id') or d.get('creator') or 'Unknown')
                          if not vw: vw = d.get('view_count')
                          if not dr: dr = d.get('duration', 0)
                          
                          v.append({
                              'id': vid, 't': title,
                              'u': f'https://youtube.com/watch?v={vid}',
                              'dr': int(dr) if dr else 0,
                              'th': f'https://i.ytimg.com/vi/{vid}/maxresdefault.jpg',
                              'c': str(ch).strip() if ch else 'Unknown',
                              'v': fm(vw),
                              'views_raw': int(vw) if vw else 0,
                              'upload_date': upload_date
                          })
                      except Exception as e:
                          print(f'      ⚠️ Skip: {str(e)[:40]}')
                          continue
              
              # Apply priority sorting
              if PRIORITY == 'most_views':
                  v.sort(key=lambda x: x['views_raw'], reverse=True)
                  print(f"   🏆 Sorted by: Most views")
              elif PRIORITY == 'newest_first':
                  v.sort(key=lambda x: x['upload_date'], reverse=True)
                  print(f"   📅 Sorted by: Newest first")
              elif PRIORITY == 'shortest_first':
                  v.sort(key=lambda x: x['dr'])
                  print(f"   ⏱️ Sorted by: Shortest duration")
              
              # Filter already downloaded videos
              new_videos = [vid for vid in v if vid['id'] not in downloaded_ids]
              skipped = len(v) - len(new_videos)
              if skipped > 0:
                  print(f"   💾 Skipping {skipped} already downloaded videos")
              
              return new_videos, channel_folder

          def mkidx(v, cn, cd):
              ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
              Path('./playlists').mkdir(exist_ok=True)
              inf = cd / 'info'
              inf.mkdir(parents=True, exist_ok=True)
              idxf = f'playlists/{cn}_{ts}.md'
              
              m = (f'# 📺 {cn}\n\n**{datetime.now():%Y-%m-%d %H:%M}** | **{len(v)} videos**\n\n'
                   f'| # | Thumbnail | Title | Duration | Views |\n'
                   f'|---|-----------|-------|----------|-------|\n')
              for i, x in enumerate(v, 1):
                  dur_str = f'{x["dr"]//60}:{x["dr"]%60:02d}' if x['dr'] else '?'
                  m += f'| {i} | [<img src="{x["th"]}" width="80">]({x["u"]}) | [{x["t"]}]({x["u"]}) | {dur_str} | {x["v"]} |\n'
              
              m += '\n---\n\n## 📝 Details\n\n'
              for i, x in enumerate(v, 1):
                  sn = f'v{i:03d}_{x["id"]}'
                  dur_str = f'{x["dr"]//60} minutes' if x['dr'] else 'Unknown'
                  info_md = (f'# 🎬 {x["t"]}\n\n'
                            f'![Thumbnail]({x["th"]})\n\n'
                            f'## Info\n\n'
                            f'| Property | Value |\n|----------|-------|\n'
                            f'| **Channel** | {x["c"]} |\n'
                            f'| **Duration** | {dur_str} |\n'
                            f'| **Views** | {x["v"]} |\n'
                            f'| **Video ID** | `{x["id"]}` |\n'
                            f'| **URL** | {x["u"]} |\n\n'
                            f'## Thumbnail\n\n'
                            f'<img src="{x["th"]}" width="640">\n\n'
                            f'---\n*Downloaded: {datetime.now():%Y-%m-%d %H:%M}*')
                  (inf / f'{sn}.md').write_text(info_md)
                  m += (f'### {i}. {x["t"]}\n\n'
                       f'![Thumbnail]({x["th"]})\n\n'
                       f'- **{dur_str}** | **{x["v"]}** views | **{x["c"]}**\n'
                       f'- 📄 [info/{sn}.md](info/{sn}.md)\n\n---\n\n')
              
              Path(idxf).write_text(m)
              print(f'📄 Index: {idxf}')
              return idxf

          def download_subtitles(video_url, output_path):
              if not SUBTITLES:
                  return None
              try:
                  # Download both manual and auto-generated subs
                  sub_file = output_path.with_suffix('.en.vtt')
                  subprocess.run(['yt-dlp', '--write-subs', '--sub-lang', 'en,fa,ar',
                                 '--write-auto-subs', '--sub-format', 'vtt',
                                 '-o', str(output_path.with_suffix('')), video_url],
                                 capture_output=True, timeout=30)
                  if sub_file.exists():
                      print(f'      📝 Subtitles downloaded')
                      return sub_file
              except:
                  pass
              return None

          def dl_video(u, quality=Q):
              e = 'mp3' if T == 'audio' else 'mp4'
              p = {'url': u, 'os': 'linux', 'output': {'type': 'audio' if T == 'audio' else 'video', 'format': e}}
              if T == 'audio': 
                  p['audio'] = {'bitrate': f'{quality}k'}
              else: 
                  p['output']['quality'] = f'{quality}p'

              for retry in range(3):
                  if retry > 0:
                      print(f'   🔄 Retry {retry}/3...')
                      time.sleep(5)
                  try:
                      rr = rq.post(API, json=p, headers=H, timeout=15)
                      if rr.status_code != 200: continue
                      d = rr.json()
                      su = d.get('statusUrl')
                      if not su: continue
                      print(f'   ⏳ Converting...')
                      for _ in range(60):
                          time.sleep(2)
                          try:
                              sr = rq.get(su, headers=H, timeout=10)
                              if sr.status_code == 200:
                                  sd = sr.json()
                                  st = sd.get('status', '')
                                  if st == 'completed':
                                      du = sd.get('downloadUrl')
                                      if du: return {'u': du, 'e': e}
                                  elif st in ('failed', 'error'): break
                          except: continue
                  except: time.sleep(2)
              return None

          def download_file(url, filepath):
              try:
                  dr = rq.get(url, headers=H, stream=True, timeout=600)
                  if dr.status_code == 200:
                      total = int(dr.headers.get('content-length', 0))
                      done = 0
                      with open(filepath, 'wb') as f:
                          for chunk in dr.iter_content(65536):
                              f.write(chunk)
                              done += len(chunk)
                              if total > 0 and done % (10*65536) == 0:
                                  print(f'\r   ⬇️ {done*100/total:.1f}%', end='')
                      print(f'\r   ⬇️ 100.0%')
                      return filepath.stat().st_size
              except Exception as e:
                  print(f'   ❌ Download error: {e}')
              return 0

          def split_file(filepath, threshold_mb):
              size_mb = filepath.stat().st_size / 1e6
              if threshold_mb > 0 and size_mb > threshold_mb:
                  print(f'   ✂️ Splitting ({size_mb:.0f}MB) into {threshold_mb}MB parts...')
                  parent = filepath.parent
                  name = filepath.name
                  subprocess.run(['zip', '-r', '-q', '-s', f'{threshold_mb}m', f'{name}.zip', name], cwd=parent, check=True)
                  filepath.unlink()
                  parts = sorted(parent.glob(f'{name}.z*'))
                  print(f'   ✅ Split into {len(parts)} parts')
                  return True
              return False

          def create_podcast_from_playlist(videos, channel_name):
              if not CREATE_PODCAST or len(videos) < 2:
                  return
              print(f'\n🎙️ Creating podcast from {len(videos)} videos...')
              audio_files = []
              for i, v in enumerate(videos):
                  # First check if audio file exists
                  audio_path = Path(f'downloads/{channel_name}_videos/v{i+1:03d}_{v["id"]}.mp3')
                  if audio_path.exists():
                      audio_files.append(str(audio_path))
              
              if len(audio_files) > 1:
                  # Create concat list
                  with open('concat_list.txt', 'w') as f:
                      for audio in audio_files:
                          f.write(f"file '{audio}'\n")
                  
                  podcast_path = f'downloads/{channel_name}_podcast.mp3'
                  subprocess.run(['ffmpeg', '-f', 'concat', '-safe', '0', 
                                 '-i', 'concat_list.txt', '-c', 'copy', podcast_path], 
                                 capture_output=True)
                  print(f'   ✅ Podcast created: {podcast_path}')

          def generate_rss_feed(videos, channel_name):
              if not GENERATE_RSS or not videos:
                  return
              print(f'\n📡 Generating RSS feed...')
              rss = f'''<?xml version="1.0" encoding="UTF-8"?>
              <rss version="2.0" xmlns:itunes="http://www.itunes.com/dtds/podcast-1.0.dtd">
              <channel>
              <title>{channel_name} - YouTube Archive</title>
              <link>https://github.com/{os.environ.get('GITHUB_REPOSITORY', '')}</link>
              <description>Auto-downloaded YouTube content from {channel_name}</description>
              <language>en</language>
              <lastBuildDate>{datetime.now().strftime('%a, %d %b %Y %H:%M:%S GMT')}</lastBuildDate>
              '''
              for v in videos[:50]:  # Last 50 videos
                  rss += f'''
                  <item>
                      <title>{v['t']}</title>
                      <link>{v['u']}</link>
                      <guid>{v['id']}</guid>
                      <description>Channel: {v['c']} | Views: {v['v']}</description>
                      <pubDate>{datetime.now().strftime('%a, %d %b %Y %H:%M:%S GMT')}</pubDate>
                  </item>'''
              
              rss += '</channel></rss>'
              rss_path = f'downloads/{channel_name}_feed.rss'
              Path(rss_path).write_text(rss)
              print(f'   ✅ RSS feed: {rss_path}')

          print(f'{"="*50}')
          print(f'🎬 {M.upper()} MODE')
          if SCHEDULE_MODE:
              print(f'⏰ Smart Scheduling: ENABLED')
          print(f'{"="*50}')

          if M == 'search':
              v, _ = gvl(f'ytsearch{MX}:{U}', MX)
              if not v: print('❌ No results'); sys.exit(1)
              ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
              Path('./searches').mkdir(exist_ok=True)
              qs = safe_name(U, 30)
              f = f'searches/{qs}_{ts}.md'
              m = (f'# 🔍 Search: {U}\n\n**{datetime.now():%Y-%m-%d %H:%M}** | **{len(v)} results**\n\n'
                   f'| # | Thumbnail | Title | Channel | Views | Duration |\n'
                   f'|---|-----------|-------|---------|-------|----------|\n')
              for i, x in enumerate(v, 1):
                  m += f'| {i} | [<img src="{x["th"]}" width="80">]({x["u"]}) | [{x["t"]}]({x["u"]}) | {x["c"][:20]} | {x["v"]} | {x["dr"]//60}m |\n'
              m += '\n---\n\n'
              for i, x in enumerate(v, 1):
                  m += (f'### {i}. {x["t"]}\n\n<img src="{x["th"]}" width="640">\n\n'
                       f'| Property | Value |\n|----------|-------|\n'
                       f'| Channel | {x["c"]} |\n| Duration | {x["dr"]//60}m |\n'
                       f'| Views | {x["v"]} |\n| ID | `{x["id"]}` |\n| URL | {x["u"]} |\n\n---\n\n')
              Path(f).write_text(m)
              Path('/tmp/meta.json').write_text(json.dumps({'m': 'search', 'ok': 0}))
              print(f'✅ {f}')

          elif M in ('playlist', 'channel'):
              print(f'\n📋 Extracting videos...')
              v, cn = gvl(U, MX)
              if not v: print('❌ No videos found'); sys.exit(1)

              cd = Path(f'downloads/{cn}_videos')
              cd.mkdir(parents=True, exist_ok=True)

              print(f'\n📝 Creating index...')
              mkidx(v, cn, cd)

              ok, fl = [], []
              print(f'\n📥 Downloading {len(v)} videos...\n{"="*50}')
              
              for i, x in enumerate(v, 1):
                  if x['id'] in downloaded_ids:
                      print(f'\n💾 [{i}/{len(v)}] Skipping {x["t"]} (already downloaded)')
                      continue
                      
                  print(f'\n📥 [{i}/{len(v)}] {x["t"]}')
                  print(f'   Channel: {x["c"]} | Duration: {x["dr"]//60}m | Views: {x["v"]}')
                  
                  # Determine qualities to download
                  qualities_to_download = MULTI_QUALITIES if MULTI_QUALITIES else [Q]
                  
                  for quality in qualities_to_download:
                      print(f'   🎯 Quality: {quality}p')
                      result = dl_video(x['u'], quality)
                      if result:
                          suffix = f'_{quality}' if len(qualities_to_download) > 1 else ''
                          fp = cd / f'v{i:03d}_{x["id"]}{suffix}.{result["e"]}'
                          size = download_file(result['u'], fp)
                          if size:
                              print(f'   ✅ Downloaded ({size/1e6:.1f}MB)')
                              split_file(fp, SP)
                              # Download subtitles for this video
                              download_subtitles(x['u'], fp)
                              ok.append(f"{x['t']} ({quality}p)")
                          else:
                              print(f'   ❌ Download failed')
                              fl.append(x['t'])
                      else:
                          print(f'   ❌ Conversion failed')
                          fl.append(x['t'])
                  
                  # Mark as downloaded in archive
                  mark_downloaded(x['id'])
                  
                  if i < len(v): 
                      print(f'   ⏳ Waiting...')
                      time.sleep(2)
              
              # Create podcast if requested
              create_podcast_from_playlist(v, cn)
              
              # Generate RSS feed if requested
              generate_rss_feed(v, cn)

              Path('/tmp/meta.json').write_text(json.dumps({
                  'm': M, 'cd': str(cd), 'ok': len(ok), 'fl': len(fl), 'total': len(v)
              }))
              print(f'\n{"="*50}')
              print(f'📊 {len(ok)}/{len(v)} downloaded successfully')
              if fl: print(f'❌ Failed: {fl}')
              print(f'{"="*50}')

          else:
              # Single video mode
              vid_match = re.search(r'(?:v=|/)([\w-]{11})', U)
              vid = vid_match.group(1) if vid_match else 'x'
              
              # Skip if already downloaded
              if vid in downloaded_ids:
                  print(f'💾 Video already downloaded, skipping...')
                  sys.exit(0)
              
              ch, _, _, handle, _ = gv(vid)
              cn = handle if handle else get_channel_from_url(U) or safe_name(ch, 30) or 'video'
              
              # Determine qualities to download
              qualities_to_download = MULTI_QUALITIES if MULTI_QUALITIES else [Q]
              
              for quality in qualities_to_download:
                  print(f'🎯 Downloading with quality: {quality}p')
                  result = dl_video(U, quality)
                  if result:
                      cd = Path(f'downloads/{cn}_videos')
                      cd.mkdir(parents=True, exist_ok=True)
                      suffix = f'_{quality}' if len(qualities_to_download) > 1 else ''
                      fp = cd / f'v_{vid}{suffix}.{result["e"]}'
                      size = download_file(result['u'], fp)
                      if size:
                          print(f'✅ Saved to {cn}_videos/ ({size/1e6:.1f}MB)')
                          split_file(fp, SP)
                          download_subtitles(U, fp)
                          mark_downloaded(vid)
                      else:
                          print('❌ Failed'); sys.exit(1)
                  else:
                      print('❌ Failed'); sys.exit(1)
          
          PYEOF

      - name: 📊 Generate Report
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 DOWNLOAD REPORT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ -f downloaded_archive.txt ]; then
            COUNT=$(wc -l < downloaded_archive.txt)
            echo "📈 Total videos downloaded to date: $COUNT"
          fi
          
          echo ""
          echo "📁 Files structure:"
          find downloads -type f -name "*.mp4" -o -name "*.mp3" 2>/dev/null | head -20 | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "   📎 $(basename "$f") ($SIZE)"
          done

      - name: 📤 Push Files
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 PUSHING TO GITHUB"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          echo ""
          echo "📋 Adding all files..."
          git add -A
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          echo "   Found $TOTAL files"
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ Nothing to push"
            exit 0
          fi
          
          git diff --cached --name-only | while read f; do
            echo "   📎 $f"
          done
          
          echo ""
          echo "📤 Pushing..."
          
          git commit -m "📦 $(date +%m%d-%H%M) [skip ci]" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 Attempt $i/5..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ DONE!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null
            [ $i -lt 5 ] && sleep $((i*5))
          done
          
          echo "   ❌ Push failed"
          exit 1
